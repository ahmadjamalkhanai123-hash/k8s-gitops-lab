name: Kubernetes GitOps CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: ls -la

      - name: Validate Helm Charts
        run: |
          helm lint helm/frontend-nginx
          helm lint helm/backend-busybox
          helm lint helm/postgresql

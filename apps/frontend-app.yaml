apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ahmadjamalkhanai123-hash/k8s-gitops-lab.git
    targetRevision: main
    path: helm/frontend-nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
